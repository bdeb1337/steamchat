name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node
          include-component-in-tag: false

  release_win:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steamchat-windows
          path: dist/**
          if-no-files-found: error

  release_linux:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install npm dependencies
        run: npm ci

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder libarchive-tools

      - name: Build app
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steamchat-linux
          path: dist/**
          if-no-files-found: error

  publish_release:
    needs:
      - release
      - release_win
      - release_linux
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: steamchat-windows
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: steamchat-linux
          path: artifacts/linux

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r -d '' artifact; do
            gh release upload --repo "${{ github.repository }}" "${{ needs.release.outputs.tag_name }}" "$artifact" --clobber
          done < <(find artifacts/windows artifacts/linux -type f -print0)
